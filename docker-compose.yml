version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8080:8080"
    environment:
      - DATABASE_DRIVER=sqlite
      - DATABASE_DSN=/data/now-and-again.db
      - JWT_SECRET=dev-secret-change-in-production
      - DATA_DIR=/data
      - GIN_MODE=release
    volumes:
      - data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/system/status"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  data:
