version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATA_DIR=/data
      - GIN_MODE=release
      # JWT_SECRET=    # 可选，不设置则自动生成并持久化到 /data/.jwt_secret
      # DB_DRIVER=postgres  # 使用 PostgreSQL 时取消注释
      # DB_DSN=host=postgres user=... password=... dbname=now_and_again sslmode=disable
    volumes:
      - data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/system/status"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  data:
